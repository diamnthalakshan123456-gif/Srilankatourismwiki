    <style type="text/css">
        h1{ color:darkred;
            text-align:center;

             }
                  .navbar{
                    display: flex;
                    justify-content: space-between;
                    align-items: center;
                    background-color:  darkcyan;
                    padding: rem(1, 2);
                    color: white;
                height: 100px;
                }
                .logo img{
                    width: 100px;
                    height: auto;
                    display: block;
                    float: left;
                     margin-right: 20px;
                }
                .nav-links{
                    display: flex;
                    list-style:none;
                    align-items: center;
                    justify-content: center;
                    flex-grow: 1;
                }
                .nav-links li{
                        margin-left: 100px;
                }
                .nav-links a{
                    color: white;
                    text-decoration: none;
                    font-weight: bold;
                    transition: 0.3s;
                    }
                    .nav-links a:hover{
                        color: #ff9900;
                    }
                    .logo{
                        font-size: 24px;
                        font-weight: bold;
                        letter-spacing: 2px;
                    }
                    .dropdown{
                        position: relative;
                    }
                    .dropdown-menu{
                        display: none;
                        position: absolute;
                        background-color:  darkcyan;
                        min-width: 160px;
                        top: 100%;
                        left: 0;
                        z-index: 999;
                    }
                    .dropdown-menu li {
                        margin: 0 !important;
                    }
                    .dropdown-menu li a {
                        padding: 10px 20px;
                        display: block;
                        font-size: 16px;
                    }
                    .dropdown:hover .dropdown-menu{
                        display: block !important;
                    }
                    .dropdown-menu li a:hover{
                        background-color: #34495e;
                        color: #f1c40f;
                    }
                    check, .checkbtn {
    display: none;

}
@media (max-width: 952px) {
    .nav-links {
        position: fixed;
        width: 100%;
        height: 100vh;
        background: #2c3e50;
        top: 80px;
        left: -100%; 
        transition: all 0.5s;
        display: block;
    }

 
    .nav-links.active {
        left: 0;
    }
}



@media screen and (max-width: 850px) {
    .checkbtn {
        display: block; 
        cursor: pointer;
    }
    
    
    .checkbtn span {
        display: block;
        width: 25px;
        height: 3px;
        background: white;
        margin: 5px;
        border-radius: 5px;
        transition: all 0.3s;
    }

    .nav-links {
        position: absolute;
        width: 100%;
        height: 100vh;
        background: #2c3e50;
        top: 80px;
        left: -100%;
        text-align: center;
        transition: all .5s;
        flex-direction: column;
    }

    .nav-links li {
        display: block;
        margin: 50px 0;
    }

  
    #check:checked ~ .nav-links {
        left: 0;
    }
}

<script>
function toggleMenu() {
    var menu = document.querySelector('.nav-links');
    if (menu.classList.contains('active')) {
        menu.classList.remove('active');
    } else {
        menu.classList.add('active');
    }
}
